<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Road Ranger AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-traffic-light"></i>
            </div>
            <div class="logo-text">Road Ranger AI</div>
        </div>
        
        <ul class="nav-links">
            <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a href="/traffic-map"><i class="fas fa-map-marked-alt"></i> Traffic Map</a></li>
            <li><a href="/predictions"><i class="fas fa-chart-line"></i> Predictions</a></li>
            <li><a href="/traffic-control"><i class="fas fa-cogs"></i> Control Panel</a></li>
            <li><a href="/reports" class="active"><i class="fas fa-file-alt"></i> Reports</a></li>
        </ul>
    </nav>

    <div class="main-container">
        <div class="reports-header">
            <h1><i class="fas fa-file-alt"></i> Traffic Analysis Reports</h1>
            <div class="report-actions">
                <button class="btn btn-primary" onclick="generateReport()">
                    <i class="fas fa-plus"></i> Generate New Report
                </button>
                <button class="btn btn-secondary" onclick="exportAllReports()">
                    <i class="fas fa-download"></i> Export All
                </button>
            </div>
        </div>

        <!-- Report Filters -->
        <div class="report-filters">
            <div class="filter-section">
                <h3><i class="fas fa-filter"></i> Filter Reports</h3>
                <div class="filter-controls">
                    <div class="filter-group">
                        <label for="report-type"><i class="fas fa-chart-bar"></i> Report Type</label>
                        <select id="report-type">
                            <option value="all">All Reports</option>
                            <option value="daily">Daily Summary</option>
                            <option value="weekly">Weekly Analysis</option>
                            <option value="monthly">Monthly Report</option>
                            <option value="performance">Performance</option>
                            <option value="congestion">Congestion Analysis</option>
                            <option value="incident">Incident Report</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="date-range"><i class="fas fa-calendar-alt"></i> Date Range</label>
                        <select id="date-range">
                            <option value="today">Today</option>
                            <option value="yesterday">Yesterday</option>
                            <option value="week">This Week</option>
                            <option value="month" selected>This Month</option>
                            <option value="quarter">This Quarter</option>
                            <option value="year">This Year</option>
                            <option value="custom">Custom Range</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="location-filter"><i class="fas fa-map-marker-alt"></i> Location</label>
                        <select id="location-filter">
                            <option value="all">All Locations</option>
                            <option value="downtown">Downtown</option>
                            <option value="suburbs">Suburbs</option>
                            <option value="highway">Highway</option>
                            <option value="commercial">Commercial District</option>
                        </select>
                    </div>
                    
                    <button class="btn btn-primary" onclick="applyFilters()">
                        <i class="fas fa-search"></i> Apply Filters
                    </button>
                    
                    <button class="btn btn-secondary" onclick="resetFilters()">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                </div>
            </div>
        </div>

        <!-- Report Cards Grid -->
        <div class="reports-grid" id="reports-container">
            <!-- Reports will be loaded here dynamically -->
        </div>

        <!-- Report Generator Modal -->
        <div class="modal" id="report-generator-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-file-alt"></i> Generate New Report</h3>
                    <button class="modal-close" onclick="closeModal('report-generator-modal')">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="report-form">
                        <div class="form-group">
                            <label for="report-title"><i class="fas fa-heading"></i> Report Title</label>
                            <input type="text" id="report-title" placeholder="Enter report title" 
                                   value="Traffic Analysis Report">
                        </div>
                        
                        <div class="form-group">
                            <label for="report-description"><i class="fas fa-align-left"></i> Description</label>
                            <textarea id="report-description" rows="3" 
                                      placeholder="Enter report description"></textarea>
                        </div>
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="report-start-date"><i class="fas fa-calendar-plus"></i> Start Date</label>
                                <input type="date" id="report-start-date" value="2024-01-01">
                            </div>
                            
                            <div class="form-group">
                                <label for="report-end-date"><i class="fas fa-calendar-minus"></i> End Date</label>
                                <input type="date" id="report-end-date" value="2024-01-31">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="report-sections"><i class="fas fa-th-list"></i> Include Sections</label>
                            <div class="checkbox-group">
                                <label class="checkbox">
                                    <input type="checkbox" checked> Summary Statistics
                                </label>
                                <label class="checkbox">
                                    <input type="checkbox" checked> Congestion Analysis
                                </label>
                                <label class="checkbox">
                                    <input type="checkbox" checked> Incident Reports
                                </label>
                                <label class="checkbox">
                                    <input type="checkbox" checked> Signal Performance
                                </label>
                                <label class="checkbox">
                                    <input type="checkbox"> Weather Impact
                                </label>
                                <label class="checkbox">
                                    <input type="checkbox"> Recommendations
                                </label>
                                <label class="checkbox">
                                    <input type="checkbox" checked> Charts & Visualizations
                                </label>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="report-format"><i class="fas fa-file"></i> Output Format</label>
                            <select id="report-format">
                                <option value="csv" selected>CSV (Excel Compatible)</option>
                                <option value="pdf">PDF Document</option>
                                <option value="excel">Excel Spreadsheet</option>
                                <option value="html">HTML Report</option>
                                <option value="json">JSON Data</option>
                            </select>
                        </div>
                        
                        <div class="form-actions">
                            <button class="btn btn-primary" onclick="createReport()">
                                <i class="fas fa-magic"></i> Generate Report
                            </button>
                            <button class="btn btn-secondary" onclick="closeModal('report-generator-modal')">
                                <i class="fas fa-times"></i> Cancel
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>

    <script>
        class ReportsManager {
            constructor() {
                this.reports = [];
                this.init();
            }
            
            init() {
                this.loadReports();
                this.setupEventListeners();
            }
            
            async loadReports() {
                try {
                    // Show loading
                    const container = document.getElementById('reports-container');
                    container.innerHTML = `
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Loading reports...</p>
                        </div>
                    `;
                    
                    // Simulate API call
                    setTimeout(() => {
                        this.reports = this.generateSampleReports();
                        this.renderReports();
                    }, 1000);
                } catch (error) {
                    console.error('Error loading reports:', error);
                    this.reports = this.generateSampleReports();
                    this.renderReports();
                }
            }
            
            generateSampleReports() {
                const reportTypes = ['daily', 'weekly', 'monthly', 'performance', 'congestion', 'incident'];
                const locations = ['Downtown', 'Suburbs', 'Highway', 'Commercial District', 'All Areas'];
                const statuses = ['completed', 'processing', 'scheduled'];
                
                return Array.from({length: 12}, (_, i) => {
                    const type = reportTypes[i % reportTypes.length];
                    const date = new Date();
                    date.setDate(date.getDate() - i * 2);
                    
                    return {
                        id: `REP-${1000 + i}`,
                        title: `${this.getTypeName(type)} Report - ${locations[i % locations.length]}`,
                        type: type,
                        description: `Analysis of traffic patterns and performance metrics for ${locations[i % locations.length]}`,
                        date: date.toISOString().split('T')[0],
                        period: this.getPeriod(type),
                        status: statuses[i % statuses.length],
                        stats: this.generateReportStats(type),
                        size: `${Math.floor(Math.random() * 5) + 1} MB`,
                        pages: Math.floor(Math.random() * 20) + 5
                    };
                });
            }
            
            getTypeName(type) {
                const names = {
                    'daily': 'Daily',
                    'weekly': 'Weekly',
                    'monthly': 'Monthly',
                    'performance': 'Performance',
                    'congestion': 'Congestion',
                    'incident': 'Incident'
                };
                return names[type] || type;
            }
            
            getPeriod(type) {
                const periods = {
                    'daily': '1 Day',
                    'weekly': '7 Days',
                    'monthly': '30 Days',
                    'performance': 'Quarterly',
                    'congestion': '14 Days',
                    'incident': '30 Days'
                };
                return periods[type] || 'Custom';
            }
            
            generateReportStats(type) {
                const baseStats = {
                    avgCongestion: Math.floor(Math.random() * 30) + 50,
                    totalIncidents: Math.floor(Math.random() * 20),
                    signalEfficiency: Math.floor(Math.random() * 20) + 75,
                    vehiclesPerDay: Math.floor(Math.random() * 10000) + 50000
                };
                
                if (type === 'performance') {
                    return {
                        ...baseStats,
                        optimizationRate: Math.floor(Math.random() * 30) + 60,
                        predictionAccuracy: Math.floor(Math.random() * 10) + 85
                    };
                } else if (type === 'incident') {
                    return {
                        ...baseStats,
                        responseTime: `${Math.floor(Math.random() * 20) + 5} mins`,
                        resolutionRate: Math.floor(Math.random() * 30) + 65
                    };
                }
                
                return baseStats;
            }
            
            renderReports() {
                const container = document.getElementById('reports-container');
                const filters = this.getCurrentFilters();
                
                // Filter reports
                let filteredReports = this.reports;
                
                if (filters.type !== 'all') {
                    filteredReports = filteredReports.filter(r => r.type === filters.type);
                }
                
                if (filters.location !== 'all') {
                    filteredReports = filteredReports.filter(r => 
                        r.title.toLowerCase().includes(filters.location.toLowerCase())
                    );
                }
                
                // Sort by date (newest first)
                filteredReports.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                // Render
                container.innerHTML = filteredReports.map(report => `
                    <div class="report-card">
                        <div class="report-header">
                            <div>
                                <div class="report-type">${this.getTypeName(report.type)}</div>
                                <div class="report-title">${report.title}</div>
                            </div>
                            <div class="report-status ${report.status}">
                                ${report.status === 'completed' ? '✓' : 
                                  report.status === 'processing' ? '⏳' : '📅'}
                            </div>
                        </div>
                        
                        <div class="report-description">
                            ${report.description}
                        </div>
                        
                        <div class="report-meta">
                            <span><i class="fas fa-calendar"></i> ${report.date}</span>
                            <span><i class="fas fa-clock"></i> ${report.period}</span>
                        </div>
                        
                        <div class="report-stats">
                            <div class="stat">
                                <div class="stat-value">${report.stats.avgCongestion}%</div>
                                <div class="stat-label">Avg. Congestion</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${report.stats.totalIncidents}</div>
                                <div class="stat-label">Incidents</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${report.stats.signalEfficiency}%</div>
                                <div class="stat-label">Signal Efficiency</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${this.formatNumber(report.stats.vehiclesPerDay)}</div>
                                <div class="stat-label">Vehicles/Day</div>
                            </div>
                        </div>
                        
                        <div class="report-actions">
                            <button class="btn btn-sm btn-primary" onclick="reportsManager.viewReport('${report.id}')">
                                <i class="fas fa-eye"></i> View
                            </button>
                            <button class="btn btn-sm btn-secondary" onclick="reportsManager.downloadReport('${report.id}')">
                                <i class="fas fa-download"></i> Download
                            </button>
                            <button class="btn btn-sm btn-warning" onclick="reportsManager.shareReport('${report.id}')">
                                <i class="fas fa-share"></i> Share
                            </button>
                            ${report.status === 'completed' ? 
                                `<button class="btn btn-sm btn-success" onclick="reportsManager.regenerateReport('${report.id}')">
                                    <i class="fas fa-sync-alt"></i> Update
                                </button>` : ''
                            }
                        </div>
                    </div>
                `).join('');
                
                if (filteredReports.length === 0) {
                    container.innerHTML = `
                        <div class="no-reports">
                            <i class="fas fa-file-alt" style="font-size: 3rem; color: var(--gray); margin-bottom: 1rem;"></i>
                            <h3>No reports found</h3>
                            <p>Try adjusting your filters or generate a new report.</p>
                            <button class="btn btn-primary" onclick="generateReport()">
                                <i class="fas fa-plus"></i> Generate New Report
                            </button>
                        </div>
                    `;
                }
            }
            
            getCurrentFilters() {
                return {
                    type: document.getElementById('report-type').value,
                    dateRange: document.getElementById('date-range').value,
                    location: document.getElementById('location-filter').value
                };
            }
            
            formatNumber(num) {
                if (num >= 1000000) {
                    return (num / 1000000).toFixed(1) + 'M';
                } else if (num >= 1000) {
                    return (num / 1000).toFixed(1) + 'K';
                }
                return num.toString();
            }
            
            setupEventListeners() {
                // Add event listeners for filter changes
                document.getElementById('report-type').addEventListener('change', () => {
                    this.renderReports();
                });
                
                document.getElementById('date-range').addEventListener('change', () => {
                    this.renderReports();
                });
                
                document.getElementById('location-filter').addEventListener('change', () => {
                    this.renderReports();
                });
            }
            
            viewReport(reportId) {
                const report = this.reports.find(r => r.id === reportId);
                if (report) {
                    this.showNotification(`Opening report: ${report.title}`, 'info');
                    this.openReportViewer(report);
                }
            }
            
            downloadReport(reportId) {
                const report = this.reports.find(r => r.id === reportId);
                if (report) {
                    this.showNotification(`Preparing download for: ${report.title}`, 'info');
                    
                    // Generate CSV content
                    const headers = ['Report ID', 'Title', 'Type', 'Date', 'Period', 'Status', 'Avg Congestion', 'Incidents', 'Signal Efficiency', 'Vehicles/Day'];
                    const row = [
                        report.id,
                        `"${report.title}"`,
                        report.type,
                        report.date,
                        `"${report.period}"`,
                        report.status,
                        report.stats.avgCongestion + '%',
                        report.stats.totalIncidents,
                        report.stats.signalEfficiency + '%',
                        report.stats.vehiclesPerDay
                    ];
                    
                    const csvContent = "data:text/csv;charset=utf-8," 
                        + headers.join(",") + "\n" 
                        + row.join(",");
                        
                    const encodedUri = encodeURI(csvContent);
                    const link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    link.setAttribute("download", `${report.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.csv`);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    this.showNotification(`Report downloaded successfully`, 'success');
                }
            }
            
            shareReport(reportId) {
                const report = this.reports.find(r => r.id === reportId);
                if (report) {
                    // In production, open share dialog
                    if (navigator.share) {
                        navigator.share({
                            title: report.title,
                            text: report.description,
                            url: window.location.href
                        });
                    } else {
                        this.showNotification(`Share link copied to clipboard`, 'info');
                        // Copy to clipboard
                        navigator.clipboard.writeText(`${report.title}\n\n${report.description}`);
                    }
                }
            }
            
            regenerateReport(reportId) {
                const report = this.reports.find(r => r.id === reportId);
                if (report) {
                    this.showNotification(`Updating report with latest data...`, 'info');
                    
                    // Simulate regeneration
                    setTimeout(() => {
                        report.date = new Date().toISOString().split('T')[0];
                        report.stats = this.generateReportStats(report.type);
                        this.renderReports();
                        this.showNotification(`Report updated successfully`, 'success');
                    }, 2000);
                }
            }
            
            openReportViewer(report) {
                // Create modal for report viewing
                const modal = document.createElement('div');
                modal.className = 'modal show';
                modal.innerHTML = `
                    <div class="modal-content" style="max-width: 1000px;">
                        <div class="modal-header">
                            <h3><i class="fas fa-file-alt"></i> ${report.title}</h3>
                            <button class="modal-close" onclick="this.parentElement.parentElement.remove()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="report-viewer">
                                <div class="report-header-viewer">
                                    <div class="report-meta-viewer">
                                        <span><i class="fas fa-calendar"></i> Generated: ${report.date}</span>
                                        <span><i class="fas fa-clock"></i> Period: ${report.period}</span>
                                        <span><i class="fas fa-file"></i> Size: ${report.size}</span>
                                        <span><i class="fas fa-copy"></i> Pages: ${report.pages}</span>
                                    </div>
                                </div>
                                
                                <div class="report-content">
                                    <h4>Executive Summary</h4>
                                    <p>This report provides a comprehensive analysis of traffic patterns, 
                                    congestion levels, and system performance for the specified period.</p>
                                    
                                    <h4>Key Metrics</h4>
                                    <div class="metrics-grid">
                                        ${Object.entries(report.stats).map(([key, value]) => `
                                            <div class="metric-viewer">
                                                <div class="metric-label">${this.formatMetricName(key)}</div>
                                                <div class="metric-value">${typeof value === 'number' && key.includes('Rate') || key.includes('Accuracy') || key.includes('Efficiency') ? value + '%' : 
                                                                         typeof value === 'number' && key.includes('Congestion') ? value + '%' : 
                                                                         typeof value === 'number' && key.includes('vehicles') ? this.formatNumber(value) : 
                                                                         value}</div>
                                            </div>
                                        `).join('')}
                                    </div>
                                    
                                    <h4>Analysis</h4>
                                    <p>The data shows ${report.stats.avgCongestion > 70 ? 'high' : 'moderate'} congestion levels 
                                    with ${report.stats.totalIncidents > 10 ? 'significant' : 'minimal'} incident occurrences. 
                                    Signal efficiency remains at ${report.stats.signalEfficiency}%, indicating 
                                    ${report.stats.signalEfficiency > 80 ? 'good' : 'room for improvement in'} system performance.</p>
                                    
                                    <h4>Charts</h4>
                                    <div class="report-charts">
                                        <canvas id="report-chart-1" height="200"></canvas>
                                        <canvas id="report-chart-2" height="200"></canvas>
                                    </div>
                                    
                                    <h4>Recommendations</h4>
                                    <ul>
                                        <li>Optimize signal timing during peak hours</li>
                                        <li>Increase monitoring in high-incident areas</li>
                                        <li>Implement predictive congestion management</li>
                                        <li>Enhance emergency response protocols</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // Add charts after modal is rendered
                setTimeout(() => {
                    this.createReportCharts(report);
                }, 100);
            }
            
            formatMetricName(key) {
                return key
                    .replace(/([A-Z])/g, ' $1')
                    .replace(/^./, str => str.toUpperCase())
                    .replace('Avg', 'Average')
                    .replace('Per Day', '/Day');
            }
            
            createReportCharts(report) {
                // Create sample charts for the report
                const ctx1 = document.getElementById('report-chart-1');
                const ctx2 = document.getElementById('report-chart-2');
                
                if (ctx1) {
                    new Chart(ctx1.getContext('2d'), {
                        type: 'bar',
                        data: {
                            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                            datasets: [{
                                label: 'Average Congestion (%)',
                                data: [65, 70, 75, 80, 85, 60, 55],
                                backgroundColor: 'rgba(67, 97, 238, 0.7)',
                                borderColor: '#4361ee',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    labels: {
                                        color: '#fff'
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    max: 100,
                                    ticks: {
                                        color: '#fff'
                                    },
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.1)'
                                    }
                                },
                                x: {
                                    ticks: {
                                        color: '#fff'
                                    },
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.1)'
                                    }
                                }
                            }
                        }
                    });
                }
                
                if (ctx2) {
                    new Chart(ctx2.getContext('2d'), {
                        type: 'pie',
                        data: {
                            labels: ['Normal', 'Heavy', 'Congested', 'Offline'],
                            datasets: [{
                                data: [65, 20, 10, 5],
                                backgroundColor: [
                                    'rgba(40, 167, 69, 0.7)',
                                    'rgba(255, 193, 7, 0.7)',
                                    'rgba(220, 53, 69, 0.7)',
                                    'rgba(108, 117, 125, 0.7)'
                                ],
                                borderColor: [
                                    '#28a745',
                                    '#ffc107',
                                    '#dc3545',
                                    '#6c757d'
                                ],
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    position: 'right',
                                    labels: {
                                        color: '#fff'
                                    }
                                }
                            }
                        }
                    });
                }
            }
            
            showNotification(message, type = 'info') {
                // Reuse notification function
                if (typeof window.showNotification === 'function') {
                    window.showNotification(message, type);
                } else {
                    alert(`${type.toUpperCase()}: ${message}`);
                }
            }
        }
        
        // Initialize reports manager
        const reportsManager = new ReportsManager();
        
        // Global functions
        function generateReport() {
            openModal('report-generator-modal');
        }
        
        function exportAllReports() {
            reportsManager.showNotification('Exporting all reports to CSV...', 'info');
            
            setTimeout(() => {
                const reports = reportsManager.reports;
                if (!reports || reports.length === 0) {
                    reportsManager.showNotification('No reports to export', 'error');
                    return;
                }

                // Generate CSV content for all reports
                const headers = ['Report ID', 'Title', 'Type', 'Date', 'Period', 'Status', 'Avg Congestion', 'Incidents', 'Signal Efficiency', 'Vehicles/Day'];
                let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n";

                reports.forEach(report => {
                    const row = [
                        report.id,
                        `"${report.title}"`,
                        report.type,
                        report.date,
                        `"${report.period}"`,
                        report.status,
                        report.stats.avgCongestion + '%',
                        report.stats.totalIncidents,
                        report.stats.signalEfficiency + '%',
                        report.stats.vehiclesPerDay
                    ];
                    csvContent += row.join(",") + "\n";
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `road_ranger_all_reports_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                reportsManager.showNotification('All reports exported successfully!', 'success');
            }, 1000);
        }
        
        function applyFilters() {
            reportsManager.renderReports();
        }
        
        function resetFilters() {
            document.getElementById('report-type').value = 'all';
            document.getElementById('date-range').value = 'month';
            document.getElementById('location-filter').value = 'all';
            reportsManager.renderReports();
        }
        
        function createReport() {
            const title = document.getElementById('report-title').value;
            const description = document.getElementById('report-description').value;
            const startDate = document.getElementById('report-start-date').value;
            const endDate = document.getElementById('report-end-date').value;
            
            if (!title || !startDate || !endDate) {
                reportsManager.showNotification('Please fill in all required fields', 'error');
                return;
            }
            
            reportsManager.showNotification(`Generating report...`, 'info');
            closeModal('report-generator-modal');
            
            // Generate real report object
            setTimeout(() => {
                // Add new report to list
                const newReport = {
                    id: `REP-${1000 + reportsManager.reports.length}`,
                    title: title,
                    type: 'custom',
                    description: description || 'Custom generated report',
                    date: new Date().toISOString().split('T')[0],
                    period: `${startDate} to ${endDate}`,
                    status: 'completed',
                    stats: reportsManager.generateReportStats('daily'), // Random stats for demo
                    size: '1.2 KB', // CSV size roughly
                    pages: 1
                };
                
                reportsManager.reports.unshift(newReport);
                reportsManager.renderReports();
                
                // Auto-download the newly created report
                reportsManager.downloadReport(newReport.id);
                
                reportsManager.showNotification(`Report "${title}" generated and downloaded!`, 'success');
            }, 1500);
        }
        
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('show');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }
        
        // Setup modal listeners
        document.addEventListener('DOMContentLoaded', function() {
            // Close modal when clicking outside
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', function(e) {
                    if (e.target === this) {
                        this.classList.remove('show');
                    }
                });
            });
            
            // Close modal with Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal.show').forEach(modal => {
                        modal.classList.remove('show');
                    });
                }
            });
        });
        
        // Make functions global
        window.reportsManager = reportsManager;
        window.generateReport = generateReport;
        window.exportAllReports = exportAllReports;
        window.applyFilters = applyFilters;
        window.resetFilters = resetFilters;
        window.createReport = createReport;
        window.openModal = openModal;
        window.closeModal = closeModal;
    </script>
</body>
</html>
