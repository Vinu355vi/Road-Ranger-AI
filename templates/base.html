<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Road Ranger AI - Traffic Prediction System{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚦</text></svg>">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Leaflet CSS (for maps) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    
    <!-- Additional Styles -->
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3a0ca3;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
            --info: #7209b7;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --gray: #6c757d;
        }
        
        /* Loading Animation */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        
        .loading-spinner-large {
            width: 80px;
            height: 80px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        .loading-text {
            color: var(--light);
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .toast {
            padding: 1rem 1.5rem;
            border-radius: 10px;
            background: var(--dark);
            border-left: 5px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            animation: slideInRight 0.3s ease;
            max-width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .toast.success {
            border-left-color: var(--success);
        }
        
        .toast.error {
            border-left-color: var(--danger);
        }
        
        .toast.warning {
            border-left-color: var(--warning);
        }
        
        .toast.info {
            border-left-color: var(--info);
        }
        
        .toast-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .toast-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .toast-close {
            background: none;
            border: none;
            color: var(--light);
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        
        .toast-close:hover {
            opacity: 1;
        }
        
        .toast-message {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
        
        /* Tooltips */
        .tooltip {
            position: relative;
            display: inline-block;
        }
        
        .tooltip .tooltip-text {
            visibility: hidden;
            background-color: var(--dark);
            color: var(--light);
            text-align: center;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.8rem;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .tooltip .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: var(--dark) transparent transparent transparent;
        }
        
        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        .modal-content {
            background: rgba(26, 26, 46, 0.95);
            border-radius: 15px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid var(--primary);
            animation: slideUp 0.3s ease;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--light);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        
        .modal-close:hover {
            opacity: 1;
        }
        
        .modal-body {
            padding: 1.5rem;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                padding: 1rem;
            }
            
            .nav-links {
                margin-top: 1rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .nav-links a {
                padding: 0.5rem;
                font-size: 0.9rem;
            }
            
            .main-container {
                padding: 1rem;
                margin-top: 120px;
            }
            
            .hero h1 {
                font-size: 2rem;
            }
            
            .hero p {
                font-size: 1rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                width: 95%;
                margin: 10px;
            }
        }
        
        @media (max-width: 480px) {
            .logo-text {
                font-size: 1.2rem;
            }
            
            .hero h1 {
                font-size: 1.5rem;
            }
            
            .cta-button {
                padding: 0.75rem 1.5rem;
                font-size: 1rem;
            }
            
            .toast {
                max-width: 300px;
            }
        }
        
        /* Dark/Light Mode Toggle */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .theme-toggle-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
            transition: transform 0.3s ease;
        }
        
        .theme-toggle-btn:hover {
            transform: scale(1.1);
        }
        
        /* Scroll to Top Button */
        .scroll-to-top {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .scroll-to-top.show {
            opacity: 1;
            visibility: visible;
        }
        
        .scroll-to-top-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--success);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(76, 201, 240, 0.3);
            transition: transform 0.3s ease;
        }
        
        .scroll-to-top-btn:hover {
            transform: translateY(-5px);
        }
        
        /* Print Styles */
        @media print {
            .navbar,
            .theme-toggle,
            .scroll-to-top,
            .no-print {
                display: none !important;
            }
            
            .main-container {
                margin-top: 0;
                padding: 0;
            }
            
            body {
                background: white !important;
                color: black !important;
            }
            
            .chart-container,
            .report-card {
                break-inside: avoid;
            }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner-large"></div>
        <div class="loading-text" id="loading-text">Loading Traffic Data...</div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>
    
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-traffic-light"></i>
            </div>
            <div class="logo-text">Road Ranger AI</div>
            <div class="system-status">
                <span class="status-indicator active">
                    <i class="fas fa-circle"></i> System Active
                </span>
            </div>
        </div>
        
        <ul class="nav-links">
            <li>
                <a href="{{ url_for('dashboard.index') }}" 
                   class="{% if request.path == '/' %}active{% endif %}">
                    <i class="fas fa-home"></i> Home
                </a>
            </li>
            <li>
                <a href="{{ url_for('dashboard.dashboard') }}" 
                   class="{% if request.path == '/dashboard' %}active{% endif %}">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
            </li>
            <li>
                <a href="{{ url_for('dashboard.traffic_map') }}" 
                   class="{% if request.path == '/traffic-map' %}active{% endif %}">
                    <i class="fas fa-map-marked-alt"></i> Traffic Map
                </a>
            </li>
            <li>
                <a href="{{ url_for('dashboard.predictions') }}" 
                   class="{% if request.path == '/predictions' %}active{% endif %}">
                    <i class="fas fa-chart-line"></i> Predictions
                </a>
            </li>
            <li>
                <a href="{{ url_for('dashboard.traffic_control') }}" 
                   class="{% if request.path == '/traffic-control' %}active{% endif %}">
                    <i class="fas fa-cogs"></i> Control Panel
                </a>
            </li>
            <li>
                <a href="{{ url_for('dashboard.reports') }}" 
                   class="{% if request.path == '/reports' %}active{% endif %}">
                    <i class="fas fa-file-alt"></i> Reports
                </a>
            </li>
            <li class="user-menu">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-details">
                        <div class="user-name">System Admin</div>
                        <div class="user-role">Traffic Manager</div>
                    </div>
                </div>
            </li>
        </ul>
    </nav>
    
    <!-- Main Content -->
    <div class="main-container">
        {% block content %}
        <!-- Page specific content goes here -->
        {% endblock %}
    </div>
    
    <!-- Theme Toggle -->
    <div class="theme-toggle">
        <button class="theme-toggle-btn" id="theme-toggle">
            <i class="fas fa-moon"></i>
        </button>
    </div>
    
    <!-- Scroll to Top -->
    <div class="scroll-to-top" id="scroll-to-top">
        <button class="scroll-to-top-btn">
            <i class="fas fa-chevron-up"></i>
        </button>
    </div>
    
    <!-- JavaScript -->
    <script>
        // Global variables and utilities
        const TrafficApp = {
            // Configuration
            config: {
                apiBaseUrl: '/api',
                refreshInterval: 30000, // 30 seconds
                maxRetries: 3,
                theme: localStorage.getItem('theme') || 'dark'
            },
            
            // State management
            state: {
                isLoading: false,
                isOnline: navigator.onLine,
                lastUpdate: null,
                notifications: []
            },
            
            // Initialize application
            init() {
                this.setTheme(this.config.theme);
                this.setupEventListeners();
                this.setupServiceWorker();
                this.checkConnection();
                this.setupAutoRefresh();
                this.showLoading(false); // Hide initial loading
            },
            
            // Theme management
            setTheme(theme) {
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                
                const toggleIcon = document.getElementById('theme-toggle');
                if (toggleIcon) {
                    toggleIcon.innerHTML = theme === 'dark' 
                        ? '<i class="fas fa-sun"></i>' 
                        : '<i class="fas fa-moon"></i>';
                }
            },
            
            toggleTheme() {
                const currentTheme = document.body.getAttribute('data-theme') || 'dark';
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                this.setTheme(newTheme);
            },
            
            // Loading state management
            showLoading(show = true, message = 'Loading...') {
                const overlay = document.getElementById('loading-overlay');
                const text = document.getElementById('loading-text');
                
                if (overlay && text) {
                    if (show) {
                        text.textContent = message;
                        overlay.style.display = 'flex';
                        setTimeout(() => {
                            overlay.style.opacity = '1';
                        }, 10);
                        this.state.isLoading = true;
                    } else {
                        overlay.style.opacity = '0';
                        setTimeout(() => {
                            overlay.style.display = 'none';
                        }, 300);
                        this.state.isLoading = false;
                    }
                }
            },
            
            // Toast notifications
            showToast(message, type = 'info', duration = 5000) {
                const container = document.getElementById('toast-container');
                if (!container) return;
                
                const toastId = 'toast-' + Date.now();
                const icons = {
                    success: 'fas fa-check-circle',
                    error: 'fas fa-exclamation-circle',
                    warning: 'fas fa-exclamation-triangle',
                    info: 'fas fa-info-circle'
                };
                
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.id = toastId;
                toast.innerHTML = `
                    <div class="toast-header">
                        <div class="toast-title">
                            <i class="${icons[type] || icons.info}"></i>
                            <span>${type.charAt(0).toUpperCase() + type.slice(1)}</span>
                        </div>
                        <button class="toast-close" onclick="TrafficApp.removeToast('${toastId}')">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="toast-message">${message}</div>
                `;
                
                container.appendChild(toast);
                
                // Auto-remove after duration
                setTimeout(() => {
                    this.removeToast(toastId);
                }, duration);
                
                return toastId;
            },
            
            removeToast(toastId) {
                const toast = document.getElementById(toastId);
                if (toast) {
                    toast.style.animation = 'slideOutRight 0.3s ease';
                    setTimeout(() => {
                        toast.remove();
                    }, 300);
                }
            },
            
            // API utilities
            async fetchData(endpoint, options = {}) {
                const url = `${this.config.apiBaseUrl}${endpoint}`;
                
                const defaultOptions = {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    ...options
                };
                
                let retries = 0;
                
                while (retries < this.config.maxRetries) {
                    try {
                        const response = await fetch(url, defaultOptions);
                        
                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                        }
                        
                        const data = await response.json();
                        this.state.lastUpdate = new Date();
                        
                        // Update last update indicator
                        this.updateLastUpdateIndicator();
                        
                        return data;
                    } catch (error) {
                        retries++;
                        
                        if (retries === this.config.maxRetries) {
                            console.error(`Failed to fetch ${endpoint}:`, error);
                            this.showToast(
                                `Failed to load data: ${error.message}`,
                                'error',
                                10000
                            );
                            throw error;
                        }
                        
                        // Exponential backoff
                        await new Promise(resolve => 
                            setTimeout(resolve, 1000 * Math.pow(2, retries))
                        );
                    }
                }
            },
            
            // Event listeners setup
            setupEventListeners() {
                // Theme toggle
                const themeToggle = document.getElementById('theme-toggle');
                if (themeToggle) {
                    themeToggle.addEventListener('click', () => this.toggleTheme());
                }
                
                // Scroll to top
                const scrollToTopBtn = document.getElementById('scroll-to-top');
                if (scrollToTopBtn) {
                    window.addEventListener('scroll', () => {
                        if (window.pageYOffset > 300) {
                            scrollToTopBtn.classList.add('show');
                        } else {
                            scrollToTopBtn.classList.remove('show');
                        }
                    });
                    
                    scrollToTopBtn.querySelector('button').addEventListener('click', () => {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });
                }
                
                // Online/offline detection
                window.addEventListener('online', () => {
                    this.state.isOnline = true;
                    this.showToast('Connection restored', 'success');
                    this.checkConnection();
                });
                
                window.addEventListener('offline', () => {
                    this.state.isOnline = false;
                    this.showToast('Connection lost. Working offline.', 'warning');
                });
                
                // Before page unload
                window.addEventListener('beforeunload', (e) => {
                    if (this.state.isLoading) {
                        e.preventDefault();
                        e.returnValue = 'Data is still loading. Are you sure you want to leave?';
                        return e.returnValue;
                    }
                });
                
                // Print functionality
                document.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                        e.preventDefault();
                        window.print();
                    }
                });
            },
            
            // Service worker setup
            async setupServiceWorker() {
                if ('serviceWorker' in navigator) {
                    try {
                        const registration = await navigator.serviceWorker.register('/sw.js');
                        console.log('ServiceWorker registered:', registration);
                    } catch (error) {
                        console.error('ServiceWorker registration failed:', error);
                    }
                }
            },
            
            // Connection check
            checkConnection() {
                const statusIndicator = document.querySelector('.status-indicator');
                if (statusIndicator) {
                    if (this.state.isOnline) {
                        statusIndicator.innerHTML = '<i class="fas fa-circle"></i> System Active';
                        statusIndicator.classList.add('active');
                    } else {
                        statusIndicator.innerHTML = '<i class="fas fa-circle"></i> Offline Mode';
                        statusIndicator.classList.remove('active');
                    }
                }
            },
            
            // Auto-refresh setup
            setupAutoRefresh() {
                setInterval(() => {
                    if (this.state.isOnline && document.visibilityState === 'visible') {
                        this.refreshData();
                    }
                }, this.config.refreshInterval);
            },
            
            // Refresh data
            async refreshData() {
                try {
                    // Dispatch refresh event
                    const event = new CustomEvent('traffic-data-refresh', {
                        detail: { timestamp: new Date() }
                    });
                    document.dispatchEvent(event);
                    
                    this.showToast('Data refreshed', 'success', 2000);
                } catch (error) {
                    console.error('Refresh failed:', error);
                }
            },
            
            // Update last update indicator
            updateLastUpdateIndicator() {
                const indicators = document.querySelectorAll('.last-update');
                if (indicators.length > 0 && this.state.lastUpdate) {
                    const timeString = this.state.lastUpdate.toLocaleTimeString([], {
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                    
                    indicators.forEach(indicator => {
                        indicator.textContent = `Last updated: ${timeString}`;
                    });
                }
            },
            
            // Format numbers
            formatNumber(num, decimals = 1) {
                if (num >= 1000000) {
                    return (num / 1000000).toFixed(decimals) + 'M';
                } else if (num >= 1000) {
                    return (num / 1000).toFixed(decimals) + 'K';
                }
                return num.toFixed(decimals);
            },
            
            // Format time
            formatTime(date) {
                if (!date) return '--:--';
                
                const d = new Date(date);
                return d.toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit'
                });
            },
            
            // Format date
            formatDate(date) {
                if (!date) return '--/--/----';
                
                const d = new Date(date);
                return d.toLocaleDateString();
            },
            
            // Calculate time difference
            timeAgo(date) {
                const now = new Date();
                const past = new Date(date);
                const diff = now - past;
                
                const minutes = Math.floor(diff / 60000);
                const hours = Math.floor(diff / 3600000);
                const days = Math.floor(diff / 86400000);
                
                if (minutes < 1) return 'Just now';
                if (minutes < 60) return `${minutes}m ago`;
                if (hours < 24) return `${hours}h ago`;
                if (days < 7) return `${days}d ago`;
                
                return this.formatDate(date);
            },
            
            // Download data
            downloadData(data, filename, type = 'application/json') {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            },
            
            // Copy to clipboard
            async copyToClipboard(text) {
                try {
                    await navigator.clipboard.writeText(text);
                    this.showToast('Copied to clipboard', 'success');
                    return true;
                } catch (error) {
                    console.error('Copy failed:', error);
                    this.showToast('Copy failed', 'error');
                    return false;
                }
            },
            
            // Modal utilities
            showModal(modalId) {
                const modal = document.getElementById(modalId);
                if (modal) {
                    modal.classList.add('show');
                    document.body.style.overflow = 'hidden';
                }
            },
            
            hideModal(modalId) {
                const modal = document.getElementById(modalId);
                if (modal) {
                    modal.classList.remove('show');
                    document.body.style.overflow = 'auto';
                }
            },
            
            // Confirmation dialog
            async confirm(message, title = 'Confirm') {
                return new Promise((resolve) => {
                    const modalId = 'confirm-modal';
                    let modal = document.getElementById(modalId);
                    
                    if (!modal) {
                        modal = document.createElement('div');
                        modal.id = modalId;
                        modal.className = 'modal';
                        modal.innerHTML = `
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h3 class="modal-title">
                                        <i class="fas fa-question-circle"></i>
                                        ${title}
                                    </h3>
                                    <button class="modal-close" onclick="TrafficApp.hideModal('${modalId}')">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                                <div class="modal-body">
                                    <p>${message}</p>
                                    <div class="modal-actions">
                                        <button class="btn btn-secondary" id="confirm-cancel">
                                            Cancel
                                        </button>
                                        <button class="btn btn-primary" id="confirm-ok">
                                            OK
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                        document.body.appendChild(modal);
                        
                        // Add styles for modal actions
                        const style = document.createElement('style');
                        style.textContent = `
                            .modal-actions {
                                display: flex;
                                justify-content: flex-end;
                                gap: 1rem;
                                margin-top: 2rem;
                            }
                        `;
                        modal.appendChild(style);
                    }
                    
                    // Update message if modal exists
                    modal.querySelector('.modal-title').innerHTML = 
                        `<i class="fas fa-question-circle"></i> ${title}`;
                    modal.querySelector('.modal-body p').textContent = message;
                    
                    // Set up event listeners
                    const cancelBtn = modal.querySelector('#confirm-cancel');
                    const okBtn = modal.querySelector('#confirm-ok');
                    
                    const cleanup = () => {
                        cancelBtn.removeEventListener('click', onCancel);
                        okBtn.removeEventListener('click', onOk);
                        this.hideModal(modalId);
                    };
                    
                    const onCancel = () => {
                        cleanup();
                        resolve(false);
                    };
                    
                    const onOk = () => {
                        cleanup();
                        resolve(true);
                    };
                    
                    cancelBtn.addEventListener('click', onCancel);
                    okBtn.addEventListener('click', onOk);
                    
                    this.showModal(modalId);
                });
            }
        };
        
        // Initialize app when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            TrafficApp.init();
            
            // Make app available globally
            window.TrafficApp = TrafficApp;
            
            // Dispatch app ready event
            document.dispatchEvent(new CustomEvent('traffic-app-ready'));
        });
    </script>
    
    <!-- Additional Scripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
